<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Gestión de Incidencias</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" th:href="@{/usuarios}">Usuarios</a>
            <a class="nav-link text-white" th:href="@{/incidencias}">Incidencias</a>
            <a class="nav-link text-white" th:href="@{/api-test}">API Externa</a>
            <a class="nav-link text-white" th:href="@{/chat}">Chat</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold text-primary mb-1">Listado de usuarios</h1>
            <p class="text-secondary mb-0">Consulta y gestión de usuarios registrados en el sistema.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/usuarios/nuevo}">Crear nuevo usuario</a>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.id}"></td>
                        <td th:text="${usuario.username}"></td>
                        <td th:text="${usuario.email}"></td>
                        <td>
                            <span class="badge text-bg-secondary"
                                  th:text="${usuario.userRole != null ? usuario.userRole.roleName : 'Sin rol'}"></span>
                        </td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary me-2"
                               th:href="@{/usuarios/editar/{id}(id=${usuario.id})}">Editar</a>
                            <a class="btn btn-sm btn-outline-danger"
                               th:href="@{/usuarios/borrar/{id}(id=${usuario.id})}">Borrar</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4">
                <a class="btn btn-outline-secondary" th:href="@{/}">Volver al inicio</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
