<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de incidencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Gestión de Incidencias</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" th:href="@{/usuarios}">Usuarios</a>
            <a class="nav-link text-white" th:href="@{/incidencias}">Incidencias</a>
            <a class="nav-link text-white" th:href="@{/api-test}">API Externa</a>
            <a class="nav-link text-white" th:href="@{/chat}">Chat</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h1 class="fw-bold text-primary mb-3">Formulario de incidencia</h1>
                    <p class="text-secondary mb-4">
                        Crea o edita incidencias del sistema.
                    </p>

                    <form th:action="@{/incidencias/guardar}" th:object="${incidencia}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Título</label>
                            <input type="text" class="form-control" th:field="*{titulo}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" rows="4" th:field="*{descripcion}" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Estado</label>
                            <input type="text" class="form-control" th:field="*{estado}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Prioridad</label>
                            <input type="text" class="form-control" th:field="*{prioridad}" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Guardar incidencia</button>
                            <a class="btn btn-outline-secondary" th:href="@{/incidencias}">Volver al listado</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
