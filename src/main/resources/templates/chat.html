<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat en tiempo real</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Gestión de Incidencias</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" th:href="@{/usuarios}">Usuarios</a>
            <a class="nav-link text-white" th:href="@{/incidencias}">Incidencias</a>
            <a class="nav-link text-white" th:href="@{/api-test}">API Externa</a>
            <a class="nav-link text-white" th:href="@{/chat}">Chat</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <h1 class="fw-bold text-primary mb-3">Chat en tiempo real</h1>
                    <p class="text-secondary mb-4">
                        Mensajería interna usando WebSocket con Spring Boot.
                    </p>

                    <div id="chatBox" class="border rounded-3 p-3 mb-4 bg-white" style="height: 350px; overflow-y: auto;">
                    </div>

                    <div class="row g-2">
                        <div class="col-md-10">
                            <input type="text" id="mensaje" class="form-control" placeholder="Escribe un mensaje">
                        </div>
                        <div class="col-md-2 d-grid">
                            <button class="btn btn-primary" onclick="enviarMensaje()">Enviar</button>
                        </div>
                    </div>

                    <div class="mt-4">
                        <a class="btn btn-outline-secondary" th:href="@{/}">Volver al inicio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const usuarioActual = [[${#authentication.name}]];
</script>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    let stompClient = null;

    function conectar() {
        const socket = new SockJS('/chat-websocket');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            stompClient.subscribe('/topic/public', function (mensaje) {
                mostrarMensaje(JSON.parse(mensaje.body));
            });
        });
    }

    function enviarMensaje() {
        const usuario = usuarioActual;
        const contenido = document.getElementById('mensaje').value;

        if (!contenido) {
            return;
        }

        stompClient.send("/app/chat.send", {}, JSON.stringify({
            usuario: usuario,
            contenido: contenido
        }));

        document.getElementById('mensaje').value = '';
    }

    function mostrarMensaje(mensaje) {
        const chatBox = document.getElementById('chatBox');
        const nuevoMensaje = document.createElement('div');
        nuevoMensaje.className = "mb-2 p-2 rounded bg-light border";
        nuevoMensaje.innerHTML = "<strong>" + mensaje.usuario + ":</strong> " + mensaje.contenido;
        chatBox.appendChild(nuevoMensaje);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    conectar();
</script>

</body>
</html>
